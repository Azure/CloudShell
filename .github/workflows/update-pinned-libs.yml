name: Update Pinned Library Versions

on:
  schedule:
    # Check for updates every 2 weeks (1st and 15th of each month) at 6:00 AM UTC
    - cron: '0 6 1,15 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-pinned-libs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot to check and update pinned versions
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
        run: |
          copilot -sp \
            --autopilot \
            --allow-all \
            --no-ask-user \
            "Follow the update-pinned-libs skill in .github/copilot/skills/update-pinned-libs.md.
          Check the latest release versions of Istio and RootlessKit using the GitHub
          Releases API. Compare them against the pinned versions in linux/base.Dockerfile.
          If any library has a newer version, edit linux/base.Dockerfile to update the
          pinned version(s). If everything is already up to date, do nothing."

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet linux/base.Dockerfile; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "All pinned library versions are already up to date."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in linux/base.Dockerfile:"
            git --no-pager diff linux/base.Dockerfile
          fi

      - name: Create branch and PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
        run: |
          BRANCH_NAME="update-pinned-libs-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add linux/base.Dockerfile
          git commit -m "chore: update pinned library versions"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "chore: update pinned library versions" \
            --body "## Automated Library Version Updates

          This PR updates pinned library versions in \`linux/base.Dockerfile\`.

          ### Changes
          \`\`\`diff
          $(git --no-pager diff HEAD~1 -- linux/base.Dockerfile)
          \`\`\`

          ---
          This PR was automatically created by the Update Pinned Library Versions workflow using GitHub Copilot CLI." \
            --base master \
            --head "$BRANCH_NAME" \
            --label "version_upgrade,automated_pr"
