name: Build & Push Cloudshell Images

on:
  push:
    branches:
      - master

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Base image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: linux/base.Dockerfile
        push: false
        tags: ghcr.io/cloudshell/base:${{ github.sha }},ghcr.io/cloudshell/base:latest

    - name: Tools image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: linux/tools.Dockerfile
        push: false
        tags: ghcr.io/cloudshell/tools:${{ github.sha }},ghcr.io/cloudshell/tools:latest
        build-args: IMAGE_LOCATION=ghcr.io/cloudshell/base:${{ github.sha }}

    - name: Scan Base image with Trivy
      id: scan_base
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: ghcr.io/cloudshell/base:${{ github.sha }}
        severity: HIGH,CRITICAL
        exit-code: 1

    - name: Scan Tools image with Trivy
      id: scan_tools
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: ghcr.io/cloudshell/tools:${{ github.sha }}
        severity: HIGH,CRITICAL
        exit-code: 1

    - name: Push Base image
      if: success()
      run: |
        docker push ghcr.io/cloudshell/base:${{ github.sha }}
        docker push ghcr.io/cloudshell/base:latest

    - name: Push Tools image
      if: success()
      run: |
        docker push ghcr.io/cloudshell/tools:${{ github.sha }}
        docker push ghcr.io/cloudshell/tools:latest
